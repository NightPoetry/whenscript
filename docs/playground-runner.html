<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>WhenScript Playground · runner</title>
<style>
  html, body { height: 100%; }
  /* app 内容由 host_create 直接挂到 body;输出条固定在底部浮层,给 body 留出底部内边距不被遮住。 */
  body { margin: 0; padding: 16px 16px 132px 16px; font-family: system-ui, -apple-system, "PingFang SC", sans-serif; background: #ffffff; color: #111; }
  #out {
    position: fixed; left: 0; right: 0; bottom: 0; max-height: 38%; overflow-y: auto;
    background: #14111f; color: #ece8f8; border-top: 1px solid #3b3358;
    font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; padding: 6px 12px;
  }
  #out .placeholder { color: #a89fc8; font-style: italic; }
  #out .line { white-space: pre-wrap; word-break: break-word; padding: 3px 0; border-bottom: 1px dashed #262138; }
  #out .line:last-child { border-bottom: none; }
  #out .line.err { color: #ff7a90; }
</style>
</head>
<body>
<div id="out"><div class="placeholder">(输出 —— print() 的内容和报错会显示在这里)</div></div>
<script type="module">
  // playground 的沙箱 trampoline(纯 infra,非 when 化目标:它就是 boot wasm 的引导层)。
  // 每次"运行"父页 playground.when 把源码存进 localStorage(storage.set)、本页只带 ?n= 换页 →
  // 天然是"一个干净引擎实例、只 boot 一次"。app 的 DOM 由 host_create 挂到 body;print()/报错捕获进
  // 底部固定输出条(不用 postMessage,也不把源码塞进 URL —— 同源 localStorage 直接读,不受 HTTP
  // 请求行/头长度上限限制;大文件如 game.when/blog.when 编进 ?hex= URL 会超限直接 431)。
  import { boot } from "./host.js?v=d288e36142";

  const outEl = document.getElementById("out");
  function emit(text, isErr) {
    const ph = outEl.querySelector(".placeholder"); if (ph) ph.remove();
    const d = document.createElement("div"); d.className = "line" + (isErr ? " err" : "");
    d.textContent = text; outEl.appendChild(d); outEl.scrollTop = outEl.scrollHeight;
  }

  // host.js 用 [boot]/[ws_fire*] 标签 console.log 出增量结果 —— 劫持转进输出条。
  const origLog = console.log.bind(console);
  console.log = (...args) => {
    origLog(...args);
    const [tag, text] = args;
    if (typeof tag === "string" && /^\[(boot|ws_fire\w*)\]$/.test(tag) && typeof text === "string" && text.length > 0)
      emit(text, text.indexOf("ERROR") === 0);
  };
  window.addEventListener("error", (e) => {
    const m = e.message || String(e.error || e);
    if (m.indexOf("ResizeObserver loop") >= 0) return;   // 浏览器已知良性警告,不当错误
    emit("ERROR: " + m, true);
  });
  window.addEventListener("unhandledrejection", (e) => {
    const r = e.reason; emit("ERROR: " + (r && r.message ? r.message : String(r)), true);
  });

  // canvas 类demo(game2d 等)的容器是固定像素尺寸(如 320×480),不随 iframe 变矮而收缩 ——
  // 面板矮于游戏高度时会被底部输出条盖住。这里做视觉缩放(transform:scale,只缩小不放大),
  // 不碰 .when 里的坐标系统:从 canvas 往上找第一个带内联 width/height 的祖先(game2d 的 stage
  // 容器)当作缩放目标。三处配合"尽可能铺满 + 绝不出现滚动条":
  //   ① 预留高度按输出条的实测高度算(通常就一行占位文字,远小于 max-height:38% 的上限),
  //      不是按那个上限算,所以能缩得更小、游戏能占得更满;
  //   ② transform 只改视觉,不改布局占位——缩小后原盒子还占着没缩小前的位置,套一层刚好等于
  //      缩放后尺寸的包裹层顶替它在文档流里的位置,不留空白;
  //   ③ 画布类 demo 是自成一体的固定视口,不需要背景滚动——直接 overflow:hidden。
  // 非 canvas 的示例(文本/长页面)不触发这段逻辑,滚动行为不变。
  function fitCanvasContainer() {
    const canvas = document.querySelector("canvas");
    if (!canvas) return;
    let el = canvas.parentElement;
    while (el && el !== document.body && !(el.style.width && el.style.height)) el = el.parentElement;
    if (!el || el === document.body) return;
    const w = parseFloat(el.style.width), h = parseFloat(el.style.height);
    if (!w || !h) return;

    let wrap = el.parentElement;
    if (!wrap.__isFitWrap) {
      wrap = document.createElement("div");
      el.parentNode.insertBefore(wrap, el);
      wrap.appendChild(el);
      wrap.__isFitWrap = true;
      wrap.style.margin = "0 auto";
      el.style.margin = "0";   // 居中改由 wrap 负责,避免和 transform 叠加算错
    }

    const outH = outEl.getBoundingClientRect().height || 40;
    const availW = document.body.clientWidth - 32;      // 左右各 16px padding
    const availH = window.innerHeight - 32 - outH;       // 上下各 16px padding + 输出条实测高度
    const scale = Math.min(1, availW / w, availH / h);

    el.style.transform = scale < 1 ? `scale(${scale})` : "";
    el.style.transformOrigin = "top center";
    wrap.style.width = (w * scale) + "px";
    wrap.style.height = (h * scale) + "px";
    document.body.style.overflow = "hidden";
  }

  (async () => {
    try {
      const source = localStorage.getItem("wsPlaygroundSrc") || "";
      if (!source) { emit("(空程序 —— 在左侧编辑区写点 WhenScript)"); return; }
      await boot("./whenscript.wasm?v=d288e36142", source);
      fitCanvasContainer();
      window.addEventListener("resize", fitCanvasContainer);
    } catch (e) {
      emit("ERROR: " + (e && e.message ? e.message : String(e)), true);
    }
  })();
</script>
</body>
</html>
