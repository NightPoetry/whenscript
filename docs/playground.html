e:none;padding:14px 16px;overflow:auto;background:transparent;color:transparent;caret-color:#ffb454;font:13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;tab-size:2;white-space:pre;outline:none;z-index:1;"></textarea></div></div></section><section data-ws-h="36" style="flex:1 1 50%;min-width:0;min-height:0;display:flex;flex-direction:column;border-left:1px solid #3b3358;"><div data-ws-h="37" style="flex:0 0 auto;font-size:11px;color:#a89fc8;letter-spacing:0.06em;text-transform:uppercase;padding:6px 12px;border-bottom:1px solid #3b3358;background:#1e1b2e;">运行结果</div><iframe data-ws-h="1" title="WhenScript 运行结果" style="flex:1 1 auto;min-height:0;width:100%;border:none;background:#fff;"></iframe></section></main></div>
<script type="module">
  // SSR 快照已经是完整首屏——这段只负责"接管"：fetch 同一份源码、boot() 引擎，
  // host.js 认领既有 data-ws-h 节点使其变为活的反应式 DOM，不重新建页面、不闪烁。
  import { boot } from "./host.js";
  window.addEventListener("error", (e) => console.error("[hydrate]", (e && e.message) || e));
  (async () => {
    const res = await fetch("./playground.when");
    if (!res.ok) throw new Error("取不到源码(" + res.status + ")");
    const source = await res.text();
    await boot("./whenscript.wasm", source);
  })().catch((e) => console.error("[hydrate]", e));
</script>
