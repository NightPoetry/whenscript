<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground · WhenScript</title>
<link rel="icon" type="image/png" href="./icon.png">
<style>
  :root {
    color-scheme: dark;
    --bg: #171426;
    --panel: #1e1b2e;
    --border: #3b3358;
    --text: #ece8f8;
    --dim: #a89fc8;
    --accent: #ffb454;
    --accent-dim: #59431f;
    --err: #ff7a90;
    --ok: #89ca78;
    --editor-bg: #14111f;
    --gutter-bg: #171426;
    --gutter-fg: #55506e;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    background: var(--panel); flex: 0 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 8px; color: var(--text); text-decoration: none; font-weight: 700; font-size: 14px; white-space: nowrap; }
  .brand svg { display: block; }
  .brand:hover { color: var(--accent); }
  header h1 {
    font-size: 15px; font-weight: 600; margin: 0; white-space: nowrap;
    letter-spacing: .2px;
  }
  header .tagline {
    font-size: 12px; color: var(--dim); white-space: nowrap; display: none;
  }
  @media (min-width: 980px) { header .tagline { display: inline; } }
  header a.hlink {
    font-size: 12px; color: var(--dim); text-decoration: none; white-space: nowrap;
    border-bottom: 1px solid transparent;
  }
  header a.hlink:hover { color: var(--accent); border-bottom-color: var(--accent); }
  header .spacer { flex: 1 1 auto; }

  select, button.run {
    font: inherit; font-size: 13px;
    background: #262138; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; cursor: pointer;
  }
  select:hover, button.run:hover { border-color: var(--accent); }
  select:focus, button.run:focus { outline: 2px solid var(--accent-dim); }

  button.run {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); border-color: var(--accent); color: #241c0a; font-weight: 700;
  }
  button.run:hover { background: #ffcb85; }
  button.run:active { transform: translateY(1px); }

  main {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: row;
  }
  @media (max-width: 760px) { main { flex-direction: column; } }

  .pane { flex: 1 1 50%; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  .pane + .pane { border-left: 1px solid var(--border); }
  @media (max-width: 760px) { .pane + .pane { border-left: none; border-top: 1px solid var(--border); } }

  .pane-label {
    flex: 0 0 auto; font-size: 11px; color: var(--dim); letter-spacing: .06em;
    padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--panel);
    text-transform: uppercase;
  }

  /* ── 编辑区:行号栏 + 高亮渲染层(底) + 透明 textarea(顶,接收输入/caret)── */
  .editor-wrap {
    flex: 1 1 auto; min-height: 0; min-width: 0;
    display: flex; flex-direction: row;
    background: var(--editor-bg); overflow: hidden;
  }
  .editor-font {
    font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    tab-size: 2;
  }
  pre.gutter {
    flex: 0 0 auto; margin: 0; overflow: hidden;
    padding: 14px 10px 14px 14px;
    text-align: right; color: var(--gutter-fg);
    background: var(--gutter-bg); border-right: 1px solid var(--border);
    white-space: pre; user-select: none;
  }
  pre.gutter .gnum { display: block; min-height: 1.55em; }   /* 每行号一块,高度由 JS 同步到对应代码行 */
  .editor-scroll { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; }
  .editor-scroll pre, .editor-scroll textarea {
    position: absolute; inset: 0; margin: 0; border: none;
    width: 100%; height: 100%;
    /* 代码自动换行(长行不再横向截断);highlight 和 textarea 同宽同字体 → 换行位置一致、视觉重合 */
    padding: 14px 16px; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word;
    scrollbar-gutter: stable;
  }
  pre#highlight {
    overflow: hidden; color: var(--text); background: transparent; pointer-events: none;
  }
  pre#highlight code { white-space: inherit; font: inherit; }
  .hl-line { display: block; min-height: 1.55em; }           /* 每逻辑行一块,可测高度对齐行号 */
  textarea#code {
    overflow: auto; resize: none;
    background: transparent; color: transparent; caret-color: var(--accent);
    z-index: 1;
  }
  textarea#code:focus { outline: none; }
  textarea#code::-webkit-scrollbar { width: 10px; height: 10px; }
  textarea#code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  textarea#code::-webkit-scrollbar-track { background: transparent; }

  /* ── 语法高亮配色(品牌暗紫主题,反应式关键字独立配色)── */
  .tok-comment  { color: #6f6a8a; font-style: italic; }
  .tok-string   { color: #89ca78; }
  .tok-interp   { color: #6fd9e7; }
  .tok-number   { color: #d19a66; }
  .tok-keyword  { color: #c586c0; }
  .tok-reactive { color: #6fd9e7; font-weight: 600; }
  .tok-arrow    { color: #ff5fa2; font-weight: 700; }
  .tok-pascal   { color: #e5c07b; }

  .result-wrap { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
  #stage { flex: 1 1 auto; min-height: 0; background: #ffffff; position: relative; }
  #stage iframe { display: block; width: 100%; height: 100%; border: none; background: #fff; }

  #output {
    flex: 0 0 auto; max-height: 34%; min-height: 84px; overflow-y: auto;
    background: var(--editor-bg); border-top: 1px solid var(--border);
    font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 6px 12px;
  }
  #output .placeholder { color: var(--dim); font-style: italic; }
  #output .line { white-space: pre-wrap; word-break: break-word; padding: 3px 0; border-bottom: 1px dashed #262138; }
  #output .line:last-child { border-bottom: none; }
  #output .line.error { color: var(--err); }
  #output .line.ok { color: var(--ok); }
</style>
</head>
<body>
  <header>
    <a class="brand" href="./index.html" title="回 WhenScript 官网">
      <svg width="20" height="20" viewBox="0 0 26 26" aria-hidden="true">
        <rect width="26" height="26" rx="6" fill="#171426"/>
        <path d="M4 17 H8 V9 H13 V17 H18 V9 H22" fill="none" stroke="#ffb454" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      WhenScript
    </a>
    <h1>Playground</h1>
    <span class="tagline">改一个值,界面自己动 —— 反应式引擎的 30 秒试玩</span>
    <a class="hlink" href="./examples.html" title="示例画廊:输出全是真跑出来的">示例画廊</a>
    <div class="spacer"></div>
    <select id="examples" aria-label="选择范例"></select>
    <button class="run" id="runBtn" title="立即运行(Ctrl/Cmd+Enter)">▶ 运行</button>
  </header>

  <main>
    <section class="pane">
      <div class="pane-label">代码 · 改了 300ms 后自动重跑</div>
      <div class="editor-wrap">
        <pre class="gutter editor-font" id="gutter" aria-hidden="true">1</pre>
        <div class="editor-scroll">
          <pre class="editor-font" id="highlight" aria-hidden="true"><code id="highlightCode"></code></pre>
          <textarea class="editor-font" id="code" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
        </div>
      </div>
    </section>
    <section class="pane">
      <div class="result-wrap">
        <div class="pane-label">运行结果</div>
        <div id="stage"><div id="placeholder-hint" style="padding:16px;color:#888;font:13px system-ui,sans-serif;">加载中…</div></div>
        <div id="output"><div class="placeholder">(暂无输出 —— print() 的内容和报错会显示在这里)</div></div>
      </div>
    </section>
  </main>

<script>
  // ── 范例菜单(直接读同目录已有的 .when 文件,不复制内容、不改它们)──────────────
  const EXAMPLES = [
    { file: "hero.when",    label: "⓪ 首页演示 · count 与派生" },
    { file: "game.when",    label: "🍎 Flappy 金苹果 · 整个游戏就是一堆 when" },
    { file: "counter.when", label: "① 计数器 · 派生 + 条件样式" },
    { file: "styled.when",  label: "② 购物车卡片 · 反应式总价" },
    { file: "switch.when",  label: "③ 路由切换 · 容器语法" },
    { file: "neon.when",    label: "④ 霓虹光效 · 图层动效" },
    { file: "events.when",  label: "⑤ 富事件 · 鼠标/键盘跟随" },
    { file: "motion.when",  label: "⑥ 动画编排 · WAAPI" },
    { file: "blog.when",    label: "⑦ 个人博客 · 前端语法综合演示" },
    { file: "mask.when",    label: "⑧ 容器蒙版 · 图层合成" },
    { file: "clip.when",    label: "⑨ 剪贴蒙版 · SVG 裁剪" },
    { file: "masonry.when", label: "⑩ 瀑布流 · 按实测高度排版" },
    { file: "sensing.when", label: "⑪ 感知信号 · 容器宽度响应" },
    { file: "window.when",  label: "⑫ 窗口信号 · 全局尺寸响应" },
  ];

  const codeEl = document.getElementById("code");
  const highlightEl = document.getElementById("highlight");
  const highlightCodeEl = document.getElementById("highlightCode");
  const gutterEl = document.getElementById("gutter");
  const stageEl = document.getElementById("stage");
  const outputEl = document.getElementById("output");
  const runBtn = document.getElementById("runBtn");
  const selectEl = document.getElementById("examples");

  for (const ex of EXAMPLES) {
    const opt = document.createElement("option");
    opt.value = ex.file;
    opt.textContent = ex.label;
    selectEl.appendChild(opt);
  }

  // ── 语法高亮:纯正则单 pass 分词,按优先级(块注释→行注释→字符串→数字→:=→
  //    反应式关键字→控制流关键字→PascalCase 容器名),其余原样转义输出 ────────
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  const REACTIVE_WORDS = "when|changed|assigned|once|until|guard|with|emit|event";
  const KEYWORD_WORDS =
    "number|string|bool|group|byte|bit|function|return|void|import|export|from|" +
    "break|each|if|else|while|for|var|switch|case|default|true|false|unknown|" +
    "before|after|delete|drop|copy|self|turn";

  const TOKEN_RE = new RegExp(
    [
      "(?<comment>/\\*[\\s\\S]*?\\*/|/\\*[\\s\\S]*|//[^\\n]*)",
      '(?<string>"(?:\\\\.|[^"\\\\])*")',
      "(?<number>\\b(?:0[xX][0-9a-fA-F]+|0[bB][01]+|\\d+\\.\\d+(?:[eE][+-]?\\d+)?|\\d+[eE][+-]?\\d+|\\d+)\\b)",
      "(?<arrow>:=)",
      "(?<reactive>\\b(?:" + REACTIVE_WORDS + ")\\b)",
      "(?<keyword>\\b(?:" + KEYWORD_WORDS + ")\\b)",
      "(?<pascal>\\b[A-Z][A-Za-z0-9_]*\\b)",
    ].join("|"),
    "g"
  );

  // 字符串内部的 ${...} 插值单独配色,其余字符串正文保持字符串色
  function highlightStringToken(raw) {
    const interpRe = /\$\{[^}]*\}/g;
    let out = "";
    let last = 0, m;
    while ((m = interpRe.exec(raw))) {
      if (m.index > last) out += '<span class="tok-string">' + escapeHtml(raw.slice(last, m.index)) + "</span>";
      out += '<span class="tok-interp">' + escapeHtml(m[0]) + "</span>";
      last = m.index + m[0].length;
    }
    if (last < raw.length) out += '<span class="tok-string">' + escapeHtml(raw.slice(last)) + "</span>";
    return out;
  }

  function highlightCode(src) {
    let out = "";
    let lastIndex = 0;
    TOKEN_RE.lastIndex = 0;
    let m;
    while ((m = TOKEN_RE.exec(src))) {
      if (m.index > lastIndex) out += escapeHtml(src.slice(lastIndex, m.index));
      const g = m.groups;
      if (g.comment !== undefined) {
        out += '<span class="tok-comment">' + escapeHtml(g.comment) + "</span>";
      } else if (g.string !== undefined) {
        out += highlightStringToken(g.string);
      } else if (g.number !== undefined) {
        out += '<span class="tok-number">' + escapeHtml(g.number) + "</span>";
      } else if (g.arrow !== undefined) {
        out += '<span class="tok-arrow">' + escapeHtml(g.arrow) + "</span>";
      } else if (g.reactive !== undefined) {
        out += '<span class="tok-reactive">' + escapeHtml(g.reactive) + "</span>";
      } else if (g.keyword !== undefined) {
        out += '<span class="tok-keyword">' + escapeHtml(g.keyword) + "</span>";
      } else if (g.pascal !== undefined) {
        out += '<span class="tok-pascal">' + escapeHtml(g.pascal) + "</span>";
      }
      lastIndex = m.index + m[0].length;
      if (m[0].length === 0) TOKEN_RE.lastIndex++;   // 保险:防零宽匹配死循环
    }
    if (lastIndex < src.length) out += escapeHtml(src.slice(lastIndex));
    return out;
  }

  // ── 行号栏:逐行号块,宽度随位数自适应(高度由 syncGutterHeights 对齐) ──────
  function renderGutter(n) {
    let s = "";
    for (let i = 1; i <= n; i++) s += '<span class="gnum">' + i + "</span>";
    gutterEl.innerHTML = s;
    gutterEl.style.width = (Math.max(2, String(n).length) * 8 + 24) + "px";
  }

  // 每逻辑行包一个 .hl-line 块 → 换行时可测各行高度,把行号块撑到同高 = 换行也对齐
  function renderHighlight() {
    const lines = codeEl.value.split("\n");
    highlightCodeEl.innerHTML = lines
      .map((l) => '<span class="hl-line">' + (highlightCode(l) || "​") + "</span>")
      .join("");
    renderGutter(lines.length);
    syncGutterHeights();
  }

  // 行号块高度 = 对应代码行的实际渲染高度(该行换行成几行,行号块就多高)
  function syncGutterHeights() {
    const hl = highlightCodeEl.querySelectorAll(".hl-line");
    const gn = gutterEl.querySelectorAll(".gnum");
    for (let i = 0; i < gn.length; i++) gn[i].style.height = hl[i] ? hl[i].offsetHeight + "px" : "";
  }
  // 编辑器宽度变化(窗口 resize / 折叠面板)→ 换行位置变 → 重新对齐行号
  window.addEventListener("resize", syncGutterHeights);

  // textarea 滚动 → 高亮层 + 行号栏跟随(逐像素同步,顶层是透明的真实输入层)
  function syncScroll() {
    highlightEl.scrollTop = codeEl.scrollTop;
    highlightEl.scrollLeft = codeEl.scrollLeft;
    gutterEl.scrollTop = codeEl.scrollTop;
  }
  codeEl.addEventListener("scroll", syncScroll);

  function onCodeChanged() {
    renderHighlight();
    syncScroll();
    scheduleRun();
  }

  // ── Tab 键在编辑区里插入两个空格,不跳出文本框 ─────────────────────────────
  codeEl.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const { selectionStart: s, selectionEnd: en } = codeEl;
      codeEl.value = codeEl.value.slice(0, s) + "  " + codeEl.value.slice(en);
      codeEl.selectionStart = codeEl.selectionEnd = s + 2;
      onCodeChanged();
    } else if ((e.key === "Enter") && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      runNow();
    }
  });
  codeEl.addEventListener("input", onCodeChanged);
  runBtn.addEventListener("click", runNow);

  let debounceTimer = null;
  function scheduleRun() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runCode, 300);   // 反应式语言的 playground 自己也该是反应式的
  }
  function runNow() {
    clearTimeout(debounceTimer);
    runCode();
  }

  // ── 输出条 ──────────────────────────────────────────────────────────────
  function clearOutput() {
    outputEl.innerHTML = '<div class="placeholder">(暂无输出 —— print() 的内容和报错会显示在这里)</div>';
  }
  function appendOutput(text, isError) {
    const ph = outputEl.querySelector(".placeholder");
    if (ph) ph.remove();
    const div = document.createElement("div");
    div.className = "line" + (isError ? " error" : "");
    div.textContent = text;
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  // ── 运行:全新 iframe(销毁重建)= 全新引擎实例,干干净净 ────────────────────
  let activeIframe = null;
  let activeMsgHandler = null;

  function runCode() {
    const source = codeEl.value;
    clearOutput();

    const iframe = document.createElement("iframe");
    iframe.id = "runnerFrame";
    iframe.title = "WhenScript 运行结果";

    iframe.addEventListener("load", () => {
      iframe.contentWindow.postMessage({ type: "run", source }, "*");
    });

    const onMsg = (ev) => {
      if (ev.source !== iframe.contentWindow) return;   // 只认当前这个 iframe 发的消息(避免旧实例串话)
      const d = ev.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "output") appendOutput(d.text, !!d.isError);
    };
    window.addEventListener("message", onMsg);

    if (activeIframe) {
      window.removeEventListener("message", activeMsgHandler);
      activeIframe.remove();
    }
    activeIframe = iframe;
    activeMsgHandler = onMsg;

    stageEl.innerHTML = "";
    stageEl.appendChild(iframe);
    iframe.src = "./playground-runner.html";
  }

  // ── 范例切换:取文件文本 → 填进编辑区 → 立即跑一次 ───────────────────────────
  async function loadExample(file) {
    const res = await fetch("./" + file);
    setCode(await res.text());
  }
  function setCode(text) {
    codeEl.value = text;
    codeEl.scrollTop = 0;
    codeEl.scrollLeft = 0;
    renderHighlight();
    syncScroll();
    runNow();
  }
  selectEl.addEventListener("change", () => loadExample(selectEl.value));

  // 初始占位(范例异步加载完成前,行号栏至少显示"1")
  renderHighlight();

  // ── 进场路由:?src=<base64url 源码>(文档页「在 Playground 打开」)>
  //             ?example=<文件名> > 默认第一个范例 ─────────────────────────────
  (function init() {
    const params = new URLSearchParams(location.search);
    const src = params.get("src");
    if (src) {
      try {
        const b64 = src.replace(/-/g, "+").replace(/_/g, "/");
        setCode(decodeURIComponent(escape(atob(b64))));
        return;
      } catch (e) { /* 解码失败 → 走默认范例 */ }
    }
    const ex = params.get("example");
    if (ex && EXAMPLES.some(x => x.file === ex)) {
      selectEl.value = ex;
      loadExample(ex);
      return;
    }
    loadExample(EXAMPLES[0].file);
  })();
</script>
</body>
</html>
